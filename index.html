<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的导航</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-2: #f9fbff;
      --text: #101828;
      --muted: #667085;
      --subtle: #98a2b3;
      --border: #e4e9f2;
      --accent: #2f6bff;
      --accent-2: #16a3a3;
      --accent-soft: #eaf1ff;
      --shadow: 0 16px 42px rgba(15, 23, 42, 0.08);
      --card-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      --radius: 8px;
      --sidebar-width: 236px;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1724;
      --surface: #151f2e;
      --surface-2: #111a28;
      --text: #edf2f7;
      --muted: #aab6c5;
      --subtle: #748196;
      --border: #263446;
      --accent: #75a1ff;
      --accent-2: #42d1c8;
      --accent-soft: rgba(117, 161, 255, 0.14);
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.32);
      --card-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(47, 107, 255, 0.12), transparent 32rem),
        linear-gradient(180deg, var(--surface-2) 0%, var(--bg) 36rem);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: 0;
      transition: background 180ms ease, color 180ms ease;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: minmax(170px, 1fr) auto;
      align-items: center;
      gap: 24px;
      max-width: 1480px;
      margin: 0 auto;
      padding: 14px 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(47, 107, 255, 0.28);
    }

    .brand-title {
      display: block;
      overflow: hidden;
      font-size: 17px;
      font-weight: 760;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-subtitle {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      margin-top: 2px;
    }

    .search {
      display: none;
      position: relative;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 18px;
      height: 18px;
      color: var(--subtle);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: 0;
      padding: 0 44px;
      background: var(--surface);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .search input:focus {
      border-color: color-mix(in srgb, var(--accent) 74%, var(--border));
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .search-kbd {
      position: absolute;
      top: 50%;
      right: 10px;
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--subtle);
      font-size: 12px;
      transform: translateY(-50%);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .theme-toggle {
      display: inline-grid;
      grid-template-columns: 18px 40px 18px;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      height: 40px;
      padding: 0 10px;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .theme-toggle:hover {
      border-color: color-mix(in srgb, var(--accent) 54%, var(--border));
      transform: translateY(-1px);
    }

    .admin-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      min-width: 72px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      padding: 0 12px;
      font-weight: 760;
      transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .admin-link:hover {
      border-color: color-mix(in srgb, var(--accent) 54%, var(--border));
      color: var(--accent);
      transform: translateY(-1px);
    }

    .login-form {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .login-form input {
      width: 280px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: 0;
      padding: 0 10px;
    }

    .login-form button {
      height: 40px;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      padding: 0 12px;
      font-weight: 760;
    }

    .token-chip {
      display: none;
      max-width: 280px;
      overflow: hidden;
      align-items: center;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      padding: 0 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .inline-action {
      display: none;
      align-items: center;
      justify-content: center;
      height: 40px;
      min-width: 72px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      padding: 0 12px;
      font-weight: 760;
    }

    .inline-action.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .inline-action.danger {
      color: #d92d20;
    }

    .edit-hint {
      display: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 760;
      margin-bottom: 16px;
      padding: 10px 12px;
    }

    [data-editing="true"] .edit-hint {
      display: block;
    }

    [data-editing="true"] .card,
    [data-editing="true"] .nav-link {
      cursor: grab;
    }

    [data-editing="true"] .card {
      outline: 1px dashed color-mix(in srgb, var(--accent) 44%, transparent);
      outline-offset: -5px;
    }

    .sort-placeholder {
      min-height: 76px;
      border: 2px dashed var(--accent);
      background: var(--accent-soft);
    }

    .category-placeholder {
      min-height: 40px;
      border: 2px dashed var(--accent);
      border-radius: var(--radius);
      background: var(--accent-soft);
    }

    .dragging {
      opacity: 0.35;
    }

    .theme-toggle svg {
      width: 17px;
      height: 17px;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      border-radius: 999px;
      background: var(--accent);
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 7px rgba(15, 23, 42, 0.26);
      transition: transform 180ms ease;
    }

    [data-theme="dark"] .switch::after {
      transform: translateX(18px);
    }

    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      gap: 22px;
      max-width: 1480px;
      margin: 0 auto;
      padding: 22px 24px 34px;
    }

    .sidebar {
      position: sticky;
      top: 87px;
      align-self: start;
      min-height: calc(100vh - 112px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar-head {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .sidebar-total {
      margin-top: 6px;
      font-size: 24px;
      line-height: 1;
      font-weight: 800;
    }

    .category-nav {
      display: grid;
      gap: 4px;
      padding: 12px;
    }

    .nav-link {
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      border-radius: var(--radius);
      padding: 5px 10px 5px 6px;
      color: var(--muted);
      transition: background 160ms ease, color 160ms ease;
    }

    .nav-link:hover,
    .nav-link.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .nav-icon {
      display: grid;
      width: 30px;
      height: 30px;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      color: inherit;
    }

    .nav-icon svg {
      width: 16px;
      height: 16px;
    }

    .nav-name {
      font-weight: 700;
    }

    .nav-count {
      color: var(--subtle);
      font-size: 12px;
    }

    .main {
      min-width: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--card-shadow);
      padding: 15px 16px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat-value {
      margin-top: 4px;
      font-size: 23px;
      font-weight: 820;
      line-height: 1.1;
    }

    .section {
      scroll-margin-top: 96px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 54px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: 16px;
      font-weight: 800;
    }

    .section-title .nav-icon {
      color: var(--accent);
    }

    .section-count {
      display: inline-flex;
      align-items: center;
      height: 22px;
      border-radius: 999px;
      padding: 0 9px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 760;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(142px, 1fr));
      gap: 1px;
      background: var(--border);
      padding: 1px;
    }

    .card {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-height: 76px;
      background: var(--surface);
      padding: 13px 14px;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .card:hover {
      position: relative;
      z-index: 1;
      background: color-mix(in srgb, var(--surface) 82%, var(--accent-soft));
      box-shadow: 0 12px 30px rgba(47, 107, 255, 0.12);
      transform: translateY(-2px);
    }

    .favicon {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, hsl(var(--hue) 82% 55%), hsl(calc(var(--hue) + 22) 86% 68%));
      color: #fff;
      font-size: 15px;
      font-weight: 820;
      overflow: hidden;
      text-transform: uppercase;
    }

    .favicon.has-icon {
      border: 1px solid var(--border);
      background: #fff;
    }

    .favicon img {
      grid-area: 1 / 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 7px;
      background: #fff;
    }

    .favicon span {
      grid-area: 1 / 1;
    }

    .favicon.has-icon span {
      display: none;
    }

    .card-title {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      font-weight: 760;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-url {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      color: var(--subtle);
      font-size: 12px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      display: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 58px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      margin-bottom: 6px;
    }

    .edit-panel {
      display: none;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .edit-panel.active {
      display: grid;
    }

    .edit-box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
    }

    .edit-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
      font-weight: 820;
    }

    .edit-form {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      padding: 12px;
    }

    .edit-form input,
    .edit-form select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: 0;
      padding: 0 10px;
    }

    .edit-form button,
    .edit-row button {
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      padding: 0 10px;
      font-weight: 760;
    }

    .edit-form button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .edit-list {
      display: grid;
      gap: 1px;
      background: var(--border);
    }

    .edit-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 54px;
      background: var(--surface);
      padding: 10px 12px;
    }

    .edit-row.active {
      background: var(--accent-soft);
    }

    .edit-title {
      overflow: hidden;
      font-weight: 780;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .edit-sub {
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .edit-actions {
      display: flex;
      gap: 6px;
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-5 { grid-column: span 5; }
    .span-6 { grid-column: span 6; }
    .span-12 { grid-column: span 12; }

    .guest-empty {
      display: none;
      min-height: calc(100vh - 170px);
      place-items: center;
      padding: 26px;
    }

    .guest-panel {
      width: min(460px, 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 26px;
      text-align: center;
    }

    .guest-panel h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .guest-panel p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .guest-panel .login-form {
      justify-content: center;
    }

    .guest-panel .login-form input {
      width: min(260px, 100%);
    }

    .footer {
      max-width: 1480px;
      margin: 0 auto;
      padding: 0 24px 26px;
      color: var(--subtle);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 960px) {
      .topbar-inner {
        grid-template-columns: 1fr auto;
      }

      .search {
        grid-column: 1 / -1;
        grid-row: 2;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        min-height: 0;
      }

      .sidebar-head {
        display: none;
      }

      .category-nav {
        display: flex;
        overflow-x: auto;
        padding: 10px;
      }

      .nav-link {
        grid-template-columns: 26px auto auto;
        flex: 0 0 auto;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .edit-panel {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .topbar-inner,
      .shell,
      .footer {
        padding-left: 14px;
        padding-right: 14px;
      }

      .brand-subtitle,
      .search-kbd,
      .token-chip {
        display: none;
      }

      .theme-toggle {
        grid-template-columns: 40px;
      }

      .login-form input {
        width: 190px;
      }

      .span-2,
      .span-3,
      .span-4,
      .span-5,
      .span-6 {
        grid-column: span 12;
      }

      .theme-toggle svg {
        display: none;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        grid-template-columns: 1fr;
        justify-items: center;
        min-height: 108px;
        text-align: center;
      }

      .card-title,
      .card-url {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="#">
        <span class="brand-mark">导</span>
        <span>
          <span class="brand-title">我的导航</span>
          <span class="brand-subtitle">个人书签中心</span>
        </span>
      </a>

      <label class="search" for="searchInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.5-3.5"></path>
        </svg>
        <input id="searchInput" type="search" autocomplete="off" placeholder="搜索书签、网站或关键词">
        <span class="search-kbd">/</span>
      </label>

      <div class="actions">
        <form class="login-form" id="loginForm">
          <input id="loginToken" type="password" autocomplete="current-password" placeholder="Token">
          <button type="submit">登录</button>
        </form>
        <span class="token-chip" id="tokenDisplay"></span>
        <button class="inline-action primary" id="editToggle" type="button">编辑</button>
        <a class="admin-link" id="adminLink" href="/admin/" aria-label="进入管理后台">管理</a>
        <button class="inline-action danger" id="logoutBtn" type="button">退出</button>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深色浅色模式">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <span class="switch" aria-hidden="true"></span>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 14.6A8.6 8.6 0 0 1 9.4 3a8.9 8.9 0 1 0 11.6 11.6Z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-head">
        <p class="sidebar-title">全部收藏</p>
        <div class="sidebar-total" id="totalCount">0</div>
      </div>
      <nav class="category-nav" id="categoryNav" aria-label="收藏分类"></nav>
    </aside>

    <main class="main">

        ...options,
        credentials: "same-origin",
        headers: {
          "content-type": "application/json",
          ...(token ? { authorization: `Bearer ${token}` } : {}),

      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {

    function getDomain(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, "");
      } catch {
        return url.replace(/^https?:\/\//, "").split("/")[0];
      }
    }

    function getInitial(title) {
      const normalized = title.trim();
      return normalized ? normalized.slice(0, 2) : "?";
    }

    function hashHue(text) {
      let hash = 0;
      for (const char of text) {
        hash = (hash * 31 + char.charCodeAt(0)) % 360;
      }
      return hash;
    }

    function iconSources(domain) {
      const sources = [];
      if (iconManifest[domain]) {
        sources.push(iconManifest[domain]);
      }
      sources.push(
        `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=128`,
        `https://icons.duckduckgo.com/ip3/${domain}.ico`
      );
      return sources;
    }

    function renderFavicon(title, domain) {
      const sources = iconSources(domain);
      const encodedSources = encodeURIComponent(JSON.stringify(sources));
      return `
        <span class="favicon" aria-hidden="true">
          <img src="${sources[0]}" alt="" loading="lazy" data-sources="${encodedSources}" data-source-index="0">
          <span>${getInitial(title)}</span>
        </span>
      `;
    }

    function bindIconFallbacks(root) {
      root.querySelectorAll(".favicon img").forEach((img) => {
        const setLoaded = () => img.parentElement.classList.add("has-icon");
        const tryNext = () => {
          const sources = JSON.parse(decodeURIComponent(img.dataset.sources || "%5B%5D"));
          const nextIndex = Number(img.dataset.sourceIndex || 0) + 1;
          if (sources[nextIndex]) {
            img.dataset.sourceIndex = String(nextIndex);
            img.src = sources[nextIndex];
          } else {
            img.remove();
          }
        };

        img.addEventListener("load", setLoaded);
        img.addEventListener("error", tryNext);
        if (img.complete && img.naturalWidth > 0) {
          setLoaded();
        }
      });
    }

    function normalize(text) {
      return text.toLowerCase().trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clearPlaceholder() {
      if (dragState.placeholder) {
        dragState.placeholder.remove();
        dragState.placeholder = null;
      }
      document.querySelectorAll(".dragging").forEach((element) => element.classList.remove("dragging"));
    }

    function placeholder(className) {
      if (!dragState.placeholder || !dragState.placeholder.classList.contains(className)) {
        clearPlaceholder();
        dragState.placeholder = document.createElement("div");
        dragState.placeholder.className = className;
      }
      return dragState.placeholder;
    }

    function cardInsertReference(container, pointerX, pointerY) {
      const cards = [...container.querySelectorAll(".card:not(.dragging)")];
      return cards.find((card) => {
        const rect = card.getBoundingClientRect();
        const sameRow = pointerY >= rect.top && pointerY <= rect.bottom;
        if (sameRow) return pointerX < rect.left + rect.width / 2;
        return pointerY < rect.top + rect.height / 2;
      }) || null;
    }

    function categoryInsertReference(container, pointerX, pointerY) {
      const items = [...container.querySelectorAll(".nav-link:not(.dragging)")];
      return items.find((item) => {
        const rect = item.getBoundingClientRect();
        const horizontal = getComputedStyle(container).display === "flex";
        return horizontal ? pointerX < rect.left + rect.width / 2 : pointerY < rect.top + rect.height / 2;
      }) || null;
    }

    function placeholderIndex(container, selector) {
      return [...container.querySelectorAll(`${selector}, .sort-placeholder, .category-placeholder`)]
        .filter((element) => !element.classList.contains("dragging"))
        .indexOf(dragState.placeholder);
    }

    function render(filterText = "") {
      const keyword = normalize(filterText);
      let matches = 0;

      content.innerHTML = "";
      nav.innerHTML = "";
      nav.ondragover = (event) => {
        if (authState.editMode && Array.from(event.dataTransfer.types).includes("application/x-category-id")) {
          event.preventDefault();
          const marker = placeholder("category-placeholder");
          nav.insertBefore(marker, categoryInsertReference(nav, event.clientX, event.clientY));
        }
      };
      nav.ondrop = async (event) => {
        const sourceCategoryId = event.dataTransfer.getData("application/x-category-id");
        if (sourceCategoryId) {
          event.preventDefault();
          await moveCategory(sourceCategoryId, placeholderIndex(nav, ".nav-link"));
        }
      };

      siteData.forEach((group, index) => {
        const filteredLinks = group.links.filter((link) => {
          const haystack = `${link.title} ${link.url} ${getDomain(link.url)} ${group.category}`;
          return normalize(haystack).includes(keyword);
        });

        if (!filteredLinks.length && !authState.editMode) {
          return;
        }

        matches += filteredLinks.length;
        const sectionId = `category-${index}`;

        const navLink = document.createElement("a");
        navLink.className = "nav-link";
        navLink.href = `#${sectionId}`;
        navLink.dataset.categoryId = group.id;
        navLink.draggable = authState.editMode;
        navLink.innerHTML = `
          <span class="nav-icon">${svgIcon(group.icon)}</span>
          <span class="nav-name">${group.category}</span>
          <span class="nav-count">${filteredLinks.length}</span>
        `;
        navLink.addEventListener("dragstart", (event) => {
          if (!authState.editMode) return;
          dragState.type = "category";
          dragState.id = String(group.id);
          event.dataTransfer.setData("application/x-category-id", String(group.id));
          event.dataTransfer.effectAllowed = "move";
          navLink.classList.add("dragging");
        });
        navLink.addEventListener("dragover", (event) => {
          if (authState.editMode && Array.from(event.dataTransfer.types).includes("application/x-category-id")) {
            event.preventDefault();
            const marker = placeholder("category-placeholder");
            nav.insertBefore(marker, categoryInsertReference(nav, event.clientX, event.clientY));
          }
        });
        navLink.addEventListener("drop", async (event) => {
          const sourceCategoryId = event.dataTransfer.getData("application/x-category-id");
          if (sourceCategoryId) {
            event.preventDefault();
            event.stopPropagation();
            await moveCategory(sourceCategoryId, placeholderIndex(nav, ".nav-link"));
          }
        });
        navLink.addEventListener("dragend", clearPlaceholder);
        nav.appendChild(navLink);

        const section = document.createElement("section");
        section.className = "section";
        section.id = sectionId;
        section.innerHTML = `
          <div class="section-head">
            <h2 class="section-title">
              <span class="nav-icon">${svgIcon(group.icon)}</span>
              ${group.category}
            </h2>
            <span class="section-count">${filteredLinks.length}</span>
          </div>
          <div class="grid"></div>
        `;

        const grid = section.querySelector(".grid");
        grid.dataset.categoryId = group.id;
        grid.addEventListener("dragover", (event) => {
          if (authState.editMode && Array.from(event.dataTransfer.types).includes("application/x-bookmark-id")) {
            event.preventDefault();
            const marker = placeholder("sort-placeholder");
            grid.insertBefore(marker, cardInsertReference(grid, event.clientX, event.clientY));
          }
        });
        grid.addEventListener("drop", async (event) => {
          const bookmarkId = event.dataTransfer.getData("application/x-bookmark-id");
          if (bookmarkId) {
            event.preventDefault();
            event.stopPropagation();
            await moveBookmark(bookmarkId, group.id, placeholderIndex(grid, ".card"));
          }
        });
        filteredLinks.forEach((link) => {
          const card = document.createElement("a");
          const domain = getDomain(link.url);
          card.className = "card";
          card.href = link.url;
          card.target = "_blank";
          card.rel = "noopener noreferrer";
          card.draggable = authState.editMode;
          card.dataset.bookmarkId = link.id;
          card.dataset.categoryId = group.id;
          card.title = `${link.title} - ${link.url}`;
          card.style.setProperty("--hue", hashHue(domain));
          card.innerHTML = `
            ${renderFavicon(link.title, domain)}
            <span class="card-copy">
              <span class="card-title">${link.title}</span>
              <span class="card-url">${domain}</span>
            </span>
          `;
          card.addEventListener("click", (event) => {
            if (authState.editMode) {
              event.preventDefault();
            }
          });
          card.addEventListener("dragstart", (event) => {
            if (!authState.editMode) return;
            dragState.type = "bookmark";
            dragState.id = String(link.id);
            dragState.sourceCategoryId = String(group.id);
            event.dataTransfer.setData("application/x-bookmark-id", String(link.id));
            event.dataTransfer.effectAllowed = "move";
            card.classList.add("dragging");
          });
          card.addEventListener("dragover", (event) => {
            if (authState.editMode && Array.from(event.dataTransfer.types).includes("application/x-bookmark-id")) {
              event.preventDefault();
              const marker = placeholder("sort-placeholder");
              grid.insertBefore(marker, cardInsertReference(grid, event.clientX, event.clientY));
            }
          });
          card.addEventListener("drop", async (event) => {
            const bookmarkId = event.dataTransfer.getData("application/x-bookmark-id");
            if (bookmarkId) {
              event.preventDefault();
              event.stopPropagation();
              await moveBookmark(bookmarkId, group.id, placeholderIndex(grid, ".card"));
            }
          });
          card.addEventListener("dragend", clearPlaceholder);
          bindIconFallbacks(card);
          grid.appendChild(card);
        });

        content.appendChild(section);
      });

      document.getElementById("matchCount").textContent = matches;
      emptyState.style.display = matches ? "none" : "block";
      updateActiveNav();
      updateAuthUi();
    }

    function updateActiveNav() {
      const links = [...document.querySelectorAll(".nav-link")];
      const sections = links
        .map((link) => document.querySelector(link.getAttribute("href")))
        .filter(Boolean);
      const current = sections.findLast((section) => section.getBoundingClientRect().top <= 130) || sections[0];

      links.forEach((link) => {
        link.classList.toggle("active", current && link.getAttribute("href") === `#${current.id}`);
      });
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem("nav-theme", theme);
    }

    function updateSummary() {
      const totalLinks = siteData.reduce((sum, item) => sum + item.links.length, 0);
      document.getElementById("totalCount").textContent = totalLinks;
      document.getElementById("categoryCount").textContent = siteData.length;
      document.getElementById("bookmarkCount").textContent = totalLinks;
    }

    function findCategory(categoryId) {
      return siteData.find((category) => String(category.id) === String(categoryId));
    }

    function findBookmark(bookmarkId) {
      for (const category of siteData) {
        const index = category.links.findIndex((bookmark) => String(bookmark.id) === String(bookmarkId));
        if (index > -1) return { category, index, bookmark: category.links[index] };
      }
      return null;
    }

    async function persistBookmarkOrder(sourceCategoryId, targetCategoryId) {
      const categoryIds = [...new Set([sourceCategoryId, targetCategoryId].filter(Boolean))];
      for (const categoryId of categoryIds) {
        const category = findCategory(categoryId);
        if (category) {
          await api("reorder/bookmarks", {
            method: "POST",
            body: JSON.stringify({ category_id: Number(category.id), ids: category.links.map((bookmark) => bookmark.id) }),
          });
        }
      }
    }

    async function moveBookmark(bookmarkId, targetCategoryId, targetIndex = -1) {
      const source = findBookmark(bookmarkId);
      const targetCategory = findCategory(targetCategoryId);
      if (!source || !targetCategory) return;

      const [bookmark] = source.category.links.splice(source.index, 1);
      bookmark.category_id = Number(targetCategory.id);

      let index = Number.isInteger(targetIndex) && targetIndex > -1 ? targetIndex : targetCategory.links.length;
      if (String(source.category.id) === String(targetCategory.id) && source.index < index) {
        index -= 1;
      }
      targetCategory.links.splice(Math.max(0, Math.min(index, targetCategory.links.length)), 0, bookmark);
      render("");
      await persistBookmarkOrder(source.category.id, targetCategory.id);
      await loadSiteData();
    }

    async function moveCategory(sourceCategoryId, targetIndex) {
      const from = siteData.findIndex((category) => String(category.id) === String(sourceCategoryId));
      if (from < 0) return;
      const [category] = siteData.splice(from, 1);
      let index = Number.isInteger(targetIndex) && targetIndex > -1 ? targetIndex : siteData.length;
      if (from < index) index -= 1;
      siteData.splice(Math.max(0, Math.min(index, siteData.length)), 0, category);
      render("");
      await api("reorder/categories", {
        method: "POST",
        body: JSON.stringify({ ids: siteData.map((item) => item.id) }),
      });
      await loadSiteData();
    }

    async function loadSiteData() {
      try {
        const response = await fetch("/api/nav", {
          headers: { accept: "application/json" },
          credentials: "same-origin",
        });
        if (!response.ok) {
          throw new Error("API unavailable");
        }
        const payload = await response.json();
        if (!payload.authenticated) {
          siteData = [];
          authState.authenticated = false;
          authState.role = "";
          authState.tenant = null;
          authState.editMode = false;
          shell.style.display = "none";
          guestEmpty.style.display = "grid";
          updateSummary();
          updateAuthUi();
          return;
        }
        if (Array.isArray(payload.data)) {
          siteData = payload.data;
        }
        authState.authenticated = true;
        authState.tenant = payload.tenant || null;
        try {
          const session = await api("auth/session");
          authState.role = session.role || "";
          authState.tenant = session.tenant || authState.tenant;
        } catch {
          authState.role = "";
        }
        if (!authState.selectedCategoryId && siteData[0]) {
          authState.selectedCategoryId = siteData[0].id;
        }
      } catch {
        siteData = [];
        authState.authenticated = false;
        authState.role = "";
        authState.tenant = null;
        authState.editMode = false;
        shell.style.display = "none";
        guestEmpty.style.display = "grid";
        updateSummary();
        updateAuthUi();
        return;
      }

      shell.style.display = "grid";
      guestEmpty.style.display = "none";
      updateSummary();
      updateAuthUi();
      render("");
    }

    applyTheme(savedTheme || (prefersDark ? "dark" : "light"));
    loadSiteData();

    searchInput.addEventListener("input", (event) => render(event.target.value));
    async function loginWithToken(token) {
      if (!token) {
        return;
      }
      const response = await fetch("/api/auth/token", {
        method: "POST",
        headers: { "content-type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ token }),
      });
      if (response.ok) {
        localStorage.setItem("nav-visible-token", token);
        document.getElementById("loginToken").value = "";
        document.getElementById("guestLoginToken").value = "";
        await loadSiteData();
        return;
      }
      throw new Error("登录失败");
    }

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const token = document.getElementById("loginToken").value.trim();
      try {
        await loginWithToken(token);
      } catch {
        document.getElementById("loginToken").select();
      }
    });
    document.getElementById("guestLoginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const token = document.getElementById("guestLoginToken").value.trim();
      try {
        await loginWithToken(token);
      } catch {
        document.getElementById("guestLoginToken").select();
      }
    });
    editToggle.addEventListener("click", () => {
      authState.editMode = !authState.editMode;
      updateAuthUi();
      render("");
    });
    logoutBtn.addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST", credentials: "same-origin" });
      localStorage.removeItem("nav-visible-token");
      window.location.href = "/";
    });
    document.getElementById("themeToggle").addEventListener("click", () => {
      const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    });
    window.addEventListener("scroll", updateActiveNav, { passive: true });
  </script>
</body>
</html>
